<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Rounded square background -->
    <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad)"/>
    
    <!-- Checkmark -->
    <path d="M 35 64 L 52 81 L 93 40" 
          stroke="white" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none"/>
    
    <!-- Subtle paper lines effect -->
    <line x1="20" y1="45" x2="108" y2="45" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="20" y1="64" x2="108" y2="64" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="20" y1="83" x2="108" y2="83" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
